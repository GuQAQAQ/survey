<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问卷数据管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #f5f0e8;
  min-height: 100vh;
}
.top-bar {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: #fff;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.top-bar h1 { font-size: 1.2em; }
.top-bar .stats { font-size: .85em; opacity: .8; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

.card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  margin-bottom: 20px;
}
.card-title {
  font-size: 1em;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid #eee;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.summary-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: #fff;
  border-radius: 10px;
  padding: 16px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  border-top: 3px solid #c41e3a;
}
.stat-card .num { font-size: 2em; font-weight: 700; color: #1a1a2e; }
.stat-card .label { font-size: .8em; color: #888; margin-top: 4px; }

.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.tab {
  padding: 10px 20px;
  border: none;
  background: #e8e0d4;
  color: #555;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  font-size: .9em;
  font-weight: 600;
  transition: all .2s;
}
.tab.active { background: #fff; color: #1a1a2e; box-shadow: 0 -2px 8px rgba(0,0,0,.06); }
.tab:hover:not(.active) { background: #ddd5c8; }

.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 16px;
}
.chart-box {
  background: #fff;
  border-radius: 10px;
  padding: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,.06);
}
.chart-box h4 { font-size: .9em; color: #333; margin-bottom: 12px; text-align: center; }
.bar-chart { display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { width: 100px; text-align: right; font-size: .78em; color: #666; flex-shrink: 0; }
.bar-track { flex: 1; height: 22px; background: #f0ece4; border-radius: 4px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; display: flex; align-items: center; padding-left: 6px; font-size: .7em; color: #fff; font-weight: 600; min-width: fit-content; }
.bar-fill.red { background: #c41e3a; }
.bar-fill.blue { background: #3a7bd5; }
.bar-fill.green { background: #2e7d32; }
.bar-fill.orange { background: #e67e22; }
.bar-fill.purple { background: #8e44ad; }
.bar-fill.teal { background: #16a085; }
.bar-fill.brown { background: #8b6914; }
.bar-fill.pink { background: #c2185b; }
.bar-pct { font-size: .75em; color: #888; width: 36px; text-align: left; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .82em; }
th {
  background: #1a1a2e;
  color: #fff;
  padding: 10px 8px;
  text-align: left;
  white-space: nowrap;
  position: sticky;
  top: 0;
}
td { padding: 8px; border-bottom: 1px solid #eee; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tr:hover td { background: #fff5f5; }
.table-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}
.search-input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: .85em; width: 200px; }
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: .82em;
  font-weight: 600;
  transition: all .2s;
}
.btn-sm { padding: 4px 10px; font-size: .78em; }
.btn-primary { background: #c41e3a; color: #fff; }
.btn-primary:hover { background: #8b0000; }
.btn-secondary { background: #f0ece4; color: #333; }
.btn-secondary:hover { background: #ddd5c8; }
.btn-danger { background: #c0392b; color: #fff; }
.btn-danger:hover { background: #962d22; }
.btn-success { background: #2e7d32; color: #fff; }
.btn-success:hover { background: #1b5e20; }
.btn-warning { background: #e67e22; color: #fff; }
.btn-warning:hover { background: #d35400; }
.btn-info { background: #3a7bd5; color: #fff; }
.btn-info:hover { background: #2c5fa1; }

.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  max-width: 600px;
  width: 95%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h3 { margin-bottom: 16px; color: #1a1a2e; }
.modal .field { margin-bottom: 10px; }
.modal .field label { display: block; font-size: .82em; color: #555; margin-bottom: 3px; font-weight: 600; }
.modal .field input, .modal .field select, .modal .field textarea {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid #ddd;
  border-radius: 5px;
  font-size: .85em;
  font-family: inherit;
}
.modal .field textarea { height: 60px; resize: vertical; }
.modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

.dropdown { position: relative; display: inline-block; }
.dropdown-menu {
  display: none;
  position: absolute;
  top: 100%;
  right: 0;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.15);
  min-width: 160px;
  z-index: 100;
}
.dropdown-menu.show { display: block; }
.dropdown-menu a {
  display: block;
  padding: 10px 16px;
  text-decoration: none;
  color: #333;
  font-size: .85em;
  cursor: pointer;
}
.dropdown-menu a:hover { background: #f5f0e8; }

.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.pagination button {
  padding: 6px 12px;
  border: 1px solid #ddd;
  background: #fff;
  border-radius: 4px;
  cursor: pointer;
  font-size: .8em;
}
.pagination button.active { background: #c41e3a; color: #fff; border-color: #c41e3a; }
.pagination button:disabled { opacity: .4; cursor: not-allowed; }

/* Login Screen */
.login-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}
.login-box {
  background: #fff;
  border-radius: 16px;
  padding: 40px;
  width: 380px;
  max-width: 95%;
  box-shadow: 0 8px 40px rgba(0,0,0,.3);
  text-align: center;
}
.login-box h2 { color: #1a1a2e; margin-bottom: 8px; }
.login-box .subtitle { color: #888; font-size: .85em; margin-bottom: 24px; }
.login-box .field { margin-bottom: 16px; text-align: left; }
.login-box .field label { display: block; font-size: .82em; color: #555; margin-bottom: 4px; font-weight: 600; }
.login-box .field input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: .92em;
  transition: border-color .2s;
}
.login-box .field input:focus { outline: none; border-color: #c41e3a; }
.login-box .btn-login {
  width: 100%;
  padding: 12px;
  background: #c41e3a;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s;
}
.login-box .btn-login:hover { background: #8b0000; }
.login-box .error { color: #c41e3a; font-size: .82em; margin-top: 8px; }
.login-box .loading { color: #888; font-size: .85em; margin-top: 8px; }
.hidden { display: none !important; }

@media (max-width: 768px) {
  .top-bar { padding: 12px 16px; }
  .container { padding: 12px; }
  .charts-grid { grid-template-columns: 1fr; }
  .bar-label { width: 70px; font-size: .7em; }
}
</style>
</head>
<body>
<!-- Login Screen -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>管理员登录</h2>
    <p class="subtitle">问卷数据管理后台</p>
    <div class="field">
      <label>邮箱</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="handleLogin()">登录</button>
    <div class="error" id="loginError"></div>
    <div class="loading hidden" id="loginLoading">正在登录…</div>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" class="hidden">
<div class="top-bar">
  <div>
    <h1>问卷数据管理后台</h1>
    <div class="stats" id="headerStats">中华优秀传统文化认同转化调研</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-info" onclick="loadFromFirebase()">从云端刷新</button>
    <button class="btn btn-secondary" onclick="handleLogout()">退出登录</button>
    <div class="dropdown">
      <button class="btn btn-success" onclick="toggleExport()">导出数据 ▾</button>
      <div class="dropdown-menu" id="exportMenu">
        <a onclick="exportCSV()">导出为 CSV</a>
        <a onclick="exportJSON()">导出为 JSON</a>
        <a onclick="exportExcel()">导出为 Excel</a>
      </div>
    </div>
  </div>
</div>
<div class="container">
  <div class="summary-row" id="summaryCards"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('stats')">数据统计</button>
    <button class="tab" onclick="switchTab('records')">数据明细</button>
    <button class="tab" onclick="switchTab('compare')">交叉分析</button>
  </div>

  <div id="tabStats">
    <div class="charts-grid" id="chartsContainer"></div>
  </div>

  <div id="tabRecords" style="display:none">
    <div class="card">
      <div class="card-title">
        <span>全部问卷数据</span>
        <button class="btn btn-primary" onclick="openAddModal()">+ 新增记录</button>
      </div>
      <div class="table-controls">
        <div style="display:flex;gap:8px">
          <input class="search-input" id="searchInput" placeholder="搜索内容…" oninput="renderTable()">
          <button class="btn btn-info" onclick="loadFromFirebase()">从云端同步</button>
        </div>
        <span style="font-size:.8em;color:#888" id="recordCount"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <div id="tabCompare" style="display:none">
    <div class="card">
      <div class="card-title">交叉分析：年级 × 了解程度</div>
      <div id="crossTabResult"></div>
    </div>
  </div>
</div>
</div>

<!-- Edit/Add Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">编辑记录</h3>
    <div id="modalBody"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
// ===== Firebase 配置（请替换为你自己的项目配置） =====
firebase.initializeApp({
  apiKey: "AIzaSyDummy123456789",
  authDomain: "your-project.firebaseapp.com",
  projectId: "your-project-id",
  storageBucket: "your-project.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef"
});
const db = firebase.firestore();
let data = [];
let currentTab = 'stats';
let currentPage = 1;
const PAGE_SIZE = 20;
let editId = null;
let editDocId = null;
let sortField = '';
let sortDir = 'asc';
const DISPLAY_QS = ['q1','q2','q3','q4','q8','q11','q12','q22'];

const Q_LABELS = {
  q1: '性别', q2: '年级', q3: '专业',
  q4: '了解程度', q5: '了解领域', q6: '字体辨认', q7: '古典文学阅读',
  q8: '兴趣程度', q9: '帮助作用', q10: '希望了解', q11: '认同度',
  q12: '参与频率', q13: '参与活动', q14: '参与动机', q15: '国风使用',
  q16: '课程满意度', q17: '形式丰富性', q18: '活动氛围', q19: '宣传力度',
  q20: '期望活动', q21: '影响因素', q22: '参与意愿'
};

const Q_VALUES = {
  q1: ['男','女'],
  q2: ['大一','大二','大三','大四'],
  q3: ['理工类','文史类','艺术类','其他'],
  q4: ['非常了解','比较了解','一般','不太了解','完全不了解'],
  q6: ['能辨认3种及以上','能辨认1-2种','只能分辨楷书','完全不能辨认'],
  q7: ['读过3部及以上','读过1-2部','只读过改编版','完全没读过'],
  q8: ['非常感兴趣','比较感兴趣','一般','不太感兴趣','完全不感兴趣'],
  q9: ['非常有帮助','比较有帮助','一般','帮助不大','没有帮助'],
  q10: ['非常希望','比较希望','一般','不太希望','完全不愿'],
  q11: ['5-非常认同','4-比较认同','3-一般','2-不太认同','1-非常不认同'],
  q12: ['经常参加','偶尔参加','很少参加','从不参加'],
  q15: ['经常使用','偶尔使用','很少使用','从不使用'],
  q16: ['非常满意','比较满意','一般','不太满意','非常不满意'],
  q17: ['非常满意','比较满意','一般','不太满意','非常不满意'],
  q18: ['非常满意','比较满意','一般','不太满意','非常不满意'],
  q19: ['非常满意','比较满意','一般','不太满意','非常不满意'],
  q22: ['非常愿意','比较愿意','看活动内容','不太愿意','完全不愿']
};

const MULTI_QS = ['q5','q13','q14','q20','q21'];
const ALL_QS = ['q1','q2','q3','q4','q5','q6','q7','q8','q9','q10','q11','q12','q13','q14','q15','q16','q17','q18','q19','q20','q21','q22'];
const COLORS = ['red','blue','green','orange','purple','teal','brown','pink'];

// ===== Firebase Auth =====
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    loadFromFirebase();
  } else {
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('mainApp').classList.add('hidden');
  }
});

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errorEl = document.getElementById('loginError');
  const loadingEl = document.getElementById('loginLoading');
  const btn = document.getElementById('loginBtn');

  if (!email || !pass) {
    errorEl.textContent = '请输入邮箱和密码';
    return;
  }

  errorEl.textContent = '';
  btn.disabled = true;
  loadingEl.classList.remove('hidden');

  try {
    await firebase.auth().signInWithEmailAndPassword(email, pass);
  } catch (err) {
    errorEl.textContent = err.message === 'The password is invalid or the user does not have a password.'
      ? '密码错误'
      : err.message === 'There is no user record corresponding to this identifier. We may have shared information about this request with third parties. Please try again in a few minutes.'
      ? '账户不存在，请检查邮箱'
      : err.message;
    btn.disabled = false;
    loadingEl.classList.add('hidden');
  }
}

function handleLogout() {
  firebase.auth().signOut();
}

// ===== Firebase Data =====
async function loadFromFirebase() {
  document.getElementById('headerStats').textContent = '正在加载…';
  try {
    const snapshot = await db.collection('responses').orderBy('submittedAt', 'desc').get();
    data = [];
    snapshot.forEach(doc => {
      const d = doc.data();
      d._docId = doc.id;
      data.push(d);
    });
    refreshAll();
  } catch (err) {
    alert('加载数据失败：' + err.message);
  }
}

async function saveToFirebase(docId, obj) {
  await db.collection('responses').doc(docId).set(obj, { merge: true });
}

async function addToFirebase(obj) {
  const ref = await db.collection('responses').add(obj);
  return ref.id;
}

async function deleteFromFirebase(docId) {
  await db.collection('responses').doc(docId).delete();
}

// ===== UI Functions =====
function refreshAll() {
  updateSummary();
  if (currentTab === 'stats') renderCharts();
  else if (currentTab === 'records') renderTable();
  else if (currentTab === 'compare') renderCrossTab();
}

function updateSummary() {
  const n = data.length;
  document.getElementById('headerStats').textContent = `共 ${n} 条记录`;

  if (n === 0) {
    document.getElementById('summaryCards').innerHTML = '<div class="empty-state"><div class="icon">📊</div><div>暂无数据</div></div>';
    return;
  }

  const interest = data.filter(r => ['非常感兴趣','比较感兴趣'].includes(r.q8)).length;
  const willing = data.filter(r => ['非常愿意','比较愿意'].includes(r.q22)).length;
  const frequent = data.filter(r => r.q12 === '经常参加').length;

  document.getElementById('summaryCards').innerHTML = `
    <div class="stat-card"><div class="num">${n}</div><div class="label">总答卷数</div></div>
    <div class="stat-card"><div class="num">${(interest/n*100).toFixed(0)}%</div><div class="label">对传统文化感兴趣</div></div>
    <div class="stat-card"><div class="num">${(willing/n*100).toFixed(0)}%</div><div class="label">愿意参加活动</div></div>
    <div class="stat-card"><div class="num">${(frequent/n*100).toFixed(0)}%</div><div class="label">经常参与活动</div></div>
  `;
}

function renderCharts() {
  if (data.length === 0) {
    document.getElementById('chartsContainer').innerHTML = '<div class="empty-state"><div class="icon">📊</div><div>暂无数据可统计</div></div>';
    return;
  }
  const n = data.length;
  const SINGLE_QS = ['q1','q2','q3','q4','q6','q7','q8','q9','q10','q11','q12','q15','q16','q17','q18','q19','q22'];
  let html = '';
  for (const q of SINGLE_QS) {
    const count = {};
    data.forEach(r => { const v = r[q]; if (v) count[v] = (count[v] || 0) + 1; });
    const entries = Object.entries(count).sort((a,b) => b[1]-a[1]);
    const bars = entries.map(([k,v], i) => {
      const pct = (v/n*100).toFixed(1);
      return `<div class="bar-row"><span class="bar-label">${k}</span><div class="bar-track"><div class="bar-fill ${COLORS[i%COLORS.length]}" style="width:${pct}%">${v}</div></div><span class="bar-pct">${pct}%</span></div>`;
    }).join('');
    html += `<div class="chart-box"><h4>${Q_LABELS[q]||q}</h4><div class="bar-chart">${bars}</div></div>`;
  }
  for (const q of MULTI_QS) {
    const count = {};
    data.forEach(r => {
      const vals = r[q];
      if (Array.isArray(vals)) vals.forEach(v => { count[v] = (count[v] || 0) + 1; });
    });
    const entries = Object.entries(count).sort((a,b) => b[1]-a[1]);
    const bars = entries.map(([k,v], i) => {
      const pct = (v/n*100).toFixed(1);
      return `<div class="bar-row"><span class="bar-label">${k}</span><div class="bar-track"><div class="bar-fill ${COLORS[i%COLORS.length]}" style="width:${pct}%">${v}</div></div><span class="bar-pct">${pct}%</span></div>`;
    }).join('');
    html += `<div class="chart-box"><h4>${Q_LABELS[q]||q}（多选）</h4><div class="bar-chart">${bars}</div></div>`;
  }
  document.getElementById('chartsContainer').innerHTML = html;
}

function sortData(arr, field, dir) {
  return [...arr].sort((a, b) => {
    let va = a[field], vb = b[field];
    if (Array.isArray(va)) va = va.join('; ');
    if (Array.isArray(vb)) vb = vb.join('; ');
    va = (va || '').toString();
    vb = (vb || '').toString();
    return dir === 'asc' ? va.localeCompare(vb, 'zh-CN') : vb.localeCompare(va, 'zh-CN');
  });
}

function toggleSort(field) {
  if (sortField === field) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
  else { sortField = field; sortDir = 'asc'; }
  currentPage = 1;
  renderTable();
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = data;
  if (search) filtered = data.filter(r => JSON.stringify(r).toLowerCase().includes(search));
  document.getElementById('recordCount').textContent = `共 ${filtered.length} 条`;
  if (sortField) filtered = sortData(filtered, sortField, sortDir);
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = 1;
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  let thead = '<tr>';
  const allCols = [{key:'id',label:'ID'}, ...DISPLAY_QS.map(q => ({key:q,label:Q_LABELS[q]})), {key:'submittedAt',label:'提交时间'}, {key:'_ops',label:'操作'}];
  allCols.forEach(col => {
    if (col.key === '_ops') { thead += `<th style="text-align:right">${col.label}</th>`; }
    else {
      const active = sortField === col.key;
      const arrow = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
      thead += `<th onclick="toggleSort('${col.key}')" style="cursor:pointer;user-select:none">${col.label}${arrow}</th>`;
    }
  });
  thead += '</tr>';
  document.getElementById('tableHead').innerHTML = thead;

  let tbody = '';
  page.forEach(r => {
    let row = `<td>${String(r.id || r._docId || '').slice(-6)}</td>`;
    DISPLAY_QS.forEach(q => {
      let val = r[q];
      if (Array.isArray(val)) val = val.join('; ');
      row += `<td title="${(val||'').replace(/"/g,'&quot;')}">${val||'-'}</td>`;
    });
    row += `<td>${r.submittedAt ? new Date(r.submittedAt).toLocaleDateString() : '-'}</td>`;
    row += `<td style="text-align:right"><button class="btn btn-sm btn-warning" onclick="openEditModal('${r._docId}')">编辑</button> <button class="btn btn-sm btn-danger" onclick="deleteRecord('${r._docId}')">删除</button></td>`;
    tbody += `<tr>${row}</tr>`;
  });
  document.getElementById('tableBody').innerHTML = tbody;

  let pagi = `<button ${currentPage<=1?'disabled':''} onclick="goPage(${currentPage-1})">‹</button>`;
  for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
    pagi += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  pagi += `<button ${currentPage>=totalPages?'disabled':''} onclick="goPage(${currentPage+1})">›</button>`;
  document.getElementById('pagination').innerHTML = pagi;

  if (filtered.length === 0) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="20" style="text-align:center;padding:40px;color:#999">暂无匹配记录</td></tr>';
  }
}

function goPage(p) { currentPage = p; renderTable(); }

async function deleteRecord(docId) {
  if (!confirm('确定删除该记录吗？')) return;
  try {
    await deleteFromFirebase(docId);
    data = data.filter(r => r._docId !== docId);
    refreshAll();
  } catch (err) {
    alert('删除失败：' + err.message);
  }
}

function openEditModal(docId) {
  const rec = data.find(r => r._docId === docId);
  if (!rec) return;
  editDocId = docId;
  document.getElementById('modalTitle').textContent = `编辑记录`;
  buildModalForm(rec);
  document.getElementById('modalOverlay').classList.add('open');
}

function openAddModal() {
  editDocId = null;
  document.getElementById('modalTitle').textContent = '新增记录';
  buildModalForm({});
  document.getElementById('modalOverlay').classList.add('open');
}

function buildModalForm(rec) {
  let html = '';
  for (const q of ALL_QS) {
    if (MULTI_QS.includes(q)) {
      const opts = Q_VALUES[q] || [];
      html += `<div class="field"><label>${Q_LABELS[q]||q}（多选）</label><div style="display:flex;flex-wrap:wrap;gap:6px">`;
      opts.forEach(o => {
        const checked = Array.isArray(rec[q]) && rec[q].includes(o) ? 'checked' : '';
        html += `<label style="font-size:.82em;display:flex;align-items:center;gap:3px"><input type="checkbox" name="${q}" value="${o}" ${checked}> ${o}</label>`;
      });
      html += '</div></div>';
    } else {
      const opts = Q_VALUES[q];
      if (opts) {
        html += `<div class="field"><label>${Q_LABELS[q]||q}</label><select name="${q}"><option value="">-- 请选择 --</option>`;
        opts.forEach(o => {
          const sel = rec[q] === o ? 'selected' : '';
          html += `<option value="${o}" ${sel}>${o}</option>`;
        });
        html += '</select></div>';
      } else {
        html += `<div class="field"><label>${Q_LABELS[q]||q}</label><input name="${q}" value="${rec[q]||''}"></div>`;
      }
    }
  }
  html += `<div class="field"><label>开放建议</label><textarea name="q23">${(rec.q23||'')}</textarea></div>`;
  document.getElementById('modalBody').innerHTML = html;
}

async function saveModal() {
  const formData = {};
  const form = document.getElementById('modalBody');
  ALL_QS.forEach(q => {
    if (MULTI_QS.includes(q)) {
      const checked = form.querySelectorAll(`input[name="${q}"]:checked`);
      formData[q] = Array.from(checked).map(c => c.value);
    } else {
      const sel = form.querySelector(`[name="${q}"]`);
      formData[q] = sel ? sel.value : '';
    }
  });
  formData.q23 = form.querySelector('[name="q23"]')?.value || '';

  try {
    if (editDocId) {
      await saveToFirebase(editDocId, formData);
      const idx = data.findIndex(r => r._docId === editDocId);
      if (idx >= 0) Object.assign(data[idx], formData);
    } else {
      formData.submittedAt = new Date().toISOString();
      const newId = await addToFirebase(formData);
      formData._docId = newId;
      data.unshift(formData);
    }
    closeModal();
    refreshAll();
  } catch (err) {
    alert('保存失败：' + err.message);
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editDocId = null;
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (['stats','records','compare'][i]) === tab);
  });
  ['tabStats','tabRecords','tabCompare'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById({stats:'tabStats',records:'tabRecords',compare:'tabCompare'}[tab]).style.display = 'block';
  refreshAll();
}

function renderCrossTab() {
  if (data.length === 0) {
    document.getElementById('crossTabResult').innerHTML = '<div class="empty-state"><div class="icon">📊</div><div>暂无数据</div></div>';
    return;
  }
  const grades = ['大一','大二','大三','大四'];
  const levels = ['非常了解','比较了解','一般','不太了解','完全不了解'];
  const matrix = {};
  grades.forEach(g => { matrix[g] = {}; levels.forEach(l => { matrix[g][l] = 0; }); });
  data.forEach(r => {
    if (matrix[r.q2] && matrix[r.q2][r.q4] !== undefined) matrix[r.q2][r.q4]++;
  });
  let html = '<div style="overflow-x:auto"><table><thead><tr><th>年级 \\ 了解程度</th>';
  levels.forEach(l => { html += `<th>${l}</th>`; });
  html += '<th>合计</th></tr></thead><tbody>';
  grades.forEach(g => {
    html += `<tr><td style="font-weight:600">${g}</td>`;
    let total = 0;
    levels.forEach(l => { const v = matrix[g][l]||0; total += v; html += `<td>${v}</td>`; });
    html += `<td>${total}</td></tr>`;
  });
  html += '</tbody></table></div>';
  document.getElementById('crossTabResult').innerHTML = html;
}

function toggleExport() { document.getElementById('exportMenu').classList.toggle('show'); }
document.addEventListener('click', e => { if (!e.target.closest('.dropdown')) document.getElementById('exportMenu').classList.remove('show'); });

function exportJSON() {
  const exportData = data.map(({_docId, ...rest}) => rest);
  downloadBlob(new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'}), 'survey_data.json');
}

function exportCSV() {
  const headers = ['submittedAt',...ALL_QS,'q23'];
  const lines = [headers.join(',')];
  data.forEach(r => {
    const row = headers.map(h => {
      let v = r[h];
      if (Array.isArray(v)) v = v.join(';');
      return `"${(v||'').replace(/"/g,'""')}"`;
    });
    lines.push(row.join(','));
  });
  downloadBlob(new Blob(['\uFEFF' + lines.join('\n')], {type:'text/csv;charset=utf-8'}), 'survey_data.csv');
}

function exportExcel() {
  const headers = ['提交时间',...ALL_QS.map(q => Q_LABELS[q]||q),'建议'];
  let html = '<table><tr>'+headers.map(h => `<th>${h}</th>`).join('')+'</tr>';
  data.forEach(r => {
    html += '<tr>';
    html += `<td>${r.submittedAt||''}</td>`;
    ALL_QS.forEach(q => {
      let v = r[q];
      if (Array.isArray(v)) v = v.join('; ');
      html += `<td>${v||''}</td>`;
    });
    html += `<td>${(r.q23||'')}</td></tr>`;
  });
  html += '</table>';
  downloadBlob(new Blob([html], {type:'application/vnd.ms-excel;charset=utf-8'}), 'survey_data.xls');
}

function downloadBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
